<!DOCTYPE html>
<html>
<head>
    <title>Edit Income</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #43cea2, #185a9d);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(255,255,255,0.15);
            padding: 30px;
            border-radius: 15px;
            color: white;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            background: #00c9ff;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Edit Income</h2>

    <form method="post">
        <input type="text" name="source" value="{{ income.source }}" required>
        <input type="number" name="amount" value="{{ income.amount }}" required>
        <button type="submit">Update</button>
    </form>
</div>

</body>
</html>
