<!DOCTYPE html>
<html>
<head>
    <title>Reports</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: 'Segoe UI';
            text-align: center;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px;
        }

        .card {
            padding: 20px;
            border-radius: 10px;
            background: #1e293b;
            width: 200px;
        }

        canvas {
            max-width: 400px;
            margin: 30px auto;
        }

        .btn {
            padding: 10px 20px;
            background: #22c55e;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>📊 Financial Report</h1>

<!-- CARDS -->
<div class="cards">
    <div class="card">💰 Income <br> ₹{{ total_income }}</div>
    <div class="card">💸 Expense <br> ₹{{ total_expense }}</div>
    <div class="card">💵 Savings <br> ₹{{ savings }}</div>
    <div class="card">{{ status }}</div>
</div>

<!-- LOAN SUMMARY -->
<div class="cards">
    <div class="card">💸 Loan Given <br> ₹{{ loan_given }}</div>
    <div class="card">💰 Loan Taken <br> ₹{{ loan_taken }}</div>
</div>

<!-- PIE CHART -->
<h3>Expense Category Breakdown</h3>
<canvas id="pieChart"></canvas>

<!-- DOWNLOAD -->
<br><br>
<a href="/download_report">
    <button class="btn">📄 Download PDF</button>
</a>

<script>
    const ctx = document.getElementById('pieChart');

    new Chart(ctx, {
        type: 'pie',
        data: {
            labels: {{ categories|tojson }},
            datasets: [{
                data: {{ values|tojson }},
                backgroundColor: ['#22c55e','#ef4444','#3b82f6','#facc15','#a855f7']
            }]
        }
    });
</script>

</body>
</html>
