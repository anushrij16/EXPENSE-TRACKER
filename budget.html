<!DOCTYPE html>
<html>
<head>
    <title>Set Budget</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #f7971e, #ffd200);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(255,255,255,0.2);
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            border: none;
            background: black;
            color: white;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Set Budget</h2>

    <form method="post">
        <input type="number" name="amount" placeholder="Enter Budget" required>
        <button type="submit">Save Budget</button>
    </form>
</div>

</body>
</html>
